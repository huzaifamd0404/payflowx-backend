# Application Configuration
spring.application.name=payflowx-backend
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/payflowx_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# Logging Configuration
logging.level.com.payflowx.backend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Transaction Management
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# API Configuration
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Kafka Producer Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.linger.ms=5

# Kafka Consumer Configuration
spring.kafka.consumer.group-id=payflowx-payment-events-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.payflowx.backend.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.payflowx.backend.dto.PaymentEventDto
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Application Kafka Topics
app.kafka.topic.payment-events=payment-events

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache Configuration
app.cache.payment-status.ttl-minutes=30

# Resilience4j Configuration
resilience4j.retry.instances.bankProcessing.max-attempts=3
resilience4j.retry.instances.bankProcessing.wait-duration=1s
resilience4j.retry.instances.bankProcessing.retry-exceptions=com.payflowx.backend.exception.TransientBankApiException
resilience4j.retry.instances.bankProcessing.fail-after-max-attempts=true

resilience4j.circuitbreaker.instances.bankProcessing.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.bankProcessing.sliding-window-size=10
resilience4j.circuitbreaker.instances.bankProcessing.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bankProcessing.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bankProcessing.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.bankProcessing.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.bankProcessing.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.bankProcessing.record-exceptions=com.payflowx.backend.exception.TransientBankApiException
