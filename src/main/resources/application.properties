# Application Configuration
spring.application.name=payflowx-backend
server.port=8080

# High Volume Thread Pool / Throughput Configuration
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=200
server.tomcat.max-connections=8192

# Spring async executor pool
spring.task.execution.thread-name-prefix=payflowx-async-
spring.task.execution.pool.core-size=20
spring.task.execution.pool.max-size=100
spring.task.execution.pool.queue-capacity=1000
spring.task.execution.pool.keep-alive=60s

# Kafka listener concurrency for consumer scaling
spring.kafka.listener.concurrency=6
spring.kafka.listener.ack-mode=record

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/payflowx_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.defaults.enabled=true

# Application Info (Actuator /info)
info.app.name=PayFlowX Backend
info.app.description=Real-Time Payment Processing Microservice
info.app.version=0.0.1-SNAPSHOT

# Logging Configuration
logging.level.com.payflowx.backend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}","level":"%p","thread":"%thread","logger":"%logger{36}","correlationId":"%X{correlationId:-N/A}","message":"%msg","exception":"%replace(%ex{full}){'[\r\n]+',' | '}"}%n

# Transaction Management
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# API Configuration
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Kafka Producer Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.linger.ms=5

# Kafka Consumer Configuration
spring.kafka.consumer.group-id=payflowx-payment-events-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.payflowx.backend.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.payflowx.backend.dto.PaymentEventDto
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Application Kafka Topics
app.kafka.topic.payment-events=payment-events

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache Configuration
app.cache.payment-status.ttl-minutes=30

# Resilience4j Configuration
resilience4j.retry.instances.bankProcessing.max-attempts=3
resilience4j.retry.instances.bankProcessing.wait-duration=1s
resilience4j.retry.instances.bankProcessing.retry-exceptions=com.payflowx.backend.exception.TransientBankApiException
resilience4j.retry.instances.bankProcessing.fail-after-max-attempts=true

resilience4j.circuitbreaker.instances.bankProcessing.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.bankProcessing.sliding-window-size=10
resilience4j.circuitbreaker.instances.bankProcessing.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bankProcessing.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bankProcessing.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.bankProcessing.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.bankProcessing.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.bankProcessing.record-exceptions=com.payflowx.backend.exception.TransientBankApiException
